<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micky CBT Platform</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="style.css">

<style>
/* Simple fix for ad spacing */
.ad-box{
  text-align:center;
  margin:20px 0;
}
</style>

</head>
<body>

<!-- INSTALL BANNER -->
<div id="installBanner" class="install-banner">
  <span>Install Micky CBT App for better experience 📲</span>
  <div>
    <button id="installBtn">Install</button>
    <button id="closeInstall">✕</button>
  </div>
</div>

<!-- HOME -->
<div id="homeSection" class="section">

  <h1>JAMB CBT Practice</h1>
  <h2>by Micky Fundz</h2>

  <div class="grid">

    <div class="card" onclick="openSubject('maths')">
      <img src="images/maths.png">
      <h3>Mathematics</h3>
    </div>

    <div class="card" onclick="openSubject('physics')">
      <img src="images/physics.png">
      <h3>Physics</h3>
    </div>

    <div class="card" onclick="openSubject('chemistry')">
      <img src="images/chemistry.png">
      <h3>Chemistry</h3>
    </div>

    <div class="card" onclick="openSubject('biology')">
      <img src="images/biology.png">
      <h3>Biology</h3>
    </div>

    <div class="card" onclick="openCBTSelection()">
      <img src="images/cbt.png">
      <h3>CBT Mode</h3>
    </div>

    <div class="card" onclick="openAbout()">
      <img src="images/about.png">
      <h3>About</h3>
    </div>

  </div>

  <button onclick="installApp()">Install App</button>

  <!-- ✅ AD UNIT (HOME PAGE) -->
  <div class="ad-box">
    <script>
      atOptions = {
        'key' : 'ae36d7e9a9e25c450bfb682ae307cc68',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320
      };
    </script>
    <script src="https://www.highperformanceformat.com/ae36d7e9a9e25c450bfb682ae307cc68/invoke.js"></script>
  </div>

</div>

<!-- ABOUT -->
<div id="aboutSection" class="section hidden">
  <div class="top-bar">
    <h2>About Micky CBT Platform</h2>
    <button onclick="goHome()">Back</button>
  </div>

  <p style="padding:20px;">
    Micky CBT Platform is a professional JAMB CBT system built to help students practice effectively.
  </p>

  <!-- ✅ AD UNIT (ABOUT PAGE) -->
  <div class="ad-box">
    <script>
      atOptions = {
        'key' : 'ae36d7e9a9e25c450bfb682ae307cc68',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320
      };
    </script>
    <script src="https://www.highperformanceformat.com/ae36d7e9a9e25c450bfb682ae307cc68/invoke.js"></script>
  </div>

</div>

<!-- SUBJECT SELECT -->
<div id="subjectSelectSection" class="section hidden">
  <h2>Select Subjects</h2>

  <label><input type="checkbox" id="maths"> Mathematics</label><br>
  <label><input type="checkbox" id="physics"> Physics</label><br>
  <label><input type="checkbox" id="chemistry"> Chemistry</label><br>
  <label><input type="checkbox" id="biology"> Biology</label><br><br>

  <button onclick="startCBT()">Start Exam</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- EXAM -->
<div id="examSection" class="section hidden">

  <div class="top-bar">
    <div id="subjectIndicator"></div>

    <div class="exam-controls">
      <div id="timer"></div>
      <button onclick="toggleCalculator()">Calculator</button>
    </div>
  </div>

  <div id="questionBox">
    <div id="questionText"></div>
    <div id="optionsContainer"></div>
  </div>

  <button onclick="prevQuestion()">Previous</button>
  <button onclick="nextQuestion()">Next</button>

  <!-- ✅ AD UNIT (EXAM PAGE) -->
  <div class="ad-box">
    <script>
      atOptions = {
        'key' : 'ae36d7e9a9e25c450bfb682ae307cc68',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320
      };
    </script>
    <script src="https://www.highperformanceformat.com/ae36d7e9a9e25c450bfb682ae307cc68/invoke.js"></script>
  </div>

</div>

<!-- RESULT -->
<div id="resultSection" class="section hidden"></div>

<script src="script.js"></script>

<script>
// INSTALL SYSTEM
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  setTimeout(() => {
    document.getElementById("installBanner").style.top = "0";
  }, 2000);
});

document.getElementById("installBtn").onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
};

document.getElementById("closeInstall").onclick = () => {
  document.getElementById("installBanner").style.display = "none";
};

function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
  }
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("servicework.js");
  });
}
</script>

</body>
</html>
